data:
  root_dir: "../pointnet_project/Pointnet_Pointnet2_pytorch/data/modelnet40_normal_resampled"
  train_split: "train"
  test_split: "test"
  num_points: 1024
  normal_channel: false

models:
  pointnet_checkpoint: "../pointnet_project/Pointnet_Pointnet2_pytorch/log/classification/pointnet2_ssg_wo_normals/checkpoints/best_model.pth"
  ulip_checkpoint: "../checkpoints/ULIP-2-PointBERT-10k-xyzrgb-pc-vit_g-objaverse_shapenet-pretrained.pt"
  openclip_checkpoint: "../checkpoints/open_clip_pytorch_model.bin"

extraction:
  batch_size: 8
  device: "cuda"
  cache_dir: "feature_cache"
  skip_if_cached: true

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  checkpoint_dir: "checkpoints"
  save_interval: 10

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "fusion_pipeline.log"